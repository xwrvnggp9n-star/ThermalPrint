# XcodeGen spec — the source of truth for ThermalPrint.xcodeproj.
# Regenerate the project with:  cd ios && xcodegen generate
# (the generated .xcodeproj is committed too, so Xcode works without xcodegen.)

name: ThermalPrint
options:
  bundleIdPrefix: app.sklar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "5Y3S9Y6Z27"   # Apple Developer team (SANDOR WADE SKLAR); Xcode auto-manages signing
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  ThermalPrint:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ThermalPrint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sklar.thermalprint
        PRODUCT_NAME: ThermalPrint
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "ThermalPrint uses Bluetooth to find and print to your MXW01 thermal printer."
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO   # no non-exempt crypto; clears the App Store compliance gate
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES   # app runs full-screen (no iPad Split View); clears the "all orientations" archive warning

        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    scheme:
      testTargets: []
